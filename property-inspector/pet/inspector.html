<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>Agent Pets</title>
  <link rel="stylesheet" href="../../libs/css/uspi.css">
  <style>
    .pet-preview { display: flex; justify-content: center; padding: 10px 0; }
    .pet-preview canvas { width: 96px; height: 96px; border-radius: 12px; background: #1e1f22; }
    .slot-input-row { display: flex; align-items: center; gap: 8px; }
    .slot-input-row input[type=number] {
      width: 72px; padding: 7px 8px; border-radius: 8px; border: 1px solid #3a3d44;
      background: #23252b; color: #fff; font-size: 14px;
    }
    .slot-input-hint { font-size: 10px; color: #8b93a1; }
    .slot-list { display: flex; flex-direction: column; gap: 6px; max-height: 150px; overflow-y: auto; margin-top: 6px; }
    .slot-opt {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px;
      border: 2px solid transparent; background: #2a2c31; cursor: pointer; color: #ddd;
    }
    .slot-opt.active { border-color: #4a9df0; color: #fff; }
    .slot-idx { font-weight: 700; opacity: .7; min-width: 26px; }
    .slot-main { flex: 1; display: flex; flex-direction: column; }
    .slot-title { font-size: 12px; }
    .slot-sub { font-size: 10px; opacity: .6; }
    .slot-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
    .bg-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .bg-opt {
      padding: 6px 10px; border-radius: 8px; border: 2px solid transparent;
      background: #2a2c31; cursor: pointer; color: #ddd; font-size: 12px;
    }
    .bg-opt.active { border-color: #4a9df0; color: #fff; }
  </style>
</head>
<body>
  <div class="uspi-wrapper hidden">

    <div class="pet-preview"><canvas id="preview" width="144" height="144"></canvas></div>

    <form id="property-inspector">
      <div class="uspi-item">
        <div class="uspi-item-label" id="slotLabel">Slot</div>
        <div class="uspi-item-value">
          <div class="slot-input-row">
            <input type="number" id="slot" name="slot" min="1" step="1" value="1">
            <span class="slot-input-hint" id="slotHint"></span>
          </div>
          <div class="slot-list" id="slotList"></div>
        </div>
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" id="bgLabel">Background</div>
        <div class="uspi-item-value">
          <div class="bg-row" id="bgRow"></div>
        </div>
      </div>
      <input type="hidden" name="bg" id="bg" value="none">
    </form>

  </div>

  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>

  <script src="../../plugin/actions/stages.js"></script>
  <script src="../../plugin/actions/petArt.js"></script>
  <script src="../../plugin/actions/backgrounds.js"></script>

  <script src="./inspector.js"></script>
</body>
</html>
